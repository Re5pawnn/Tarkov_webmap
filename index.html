<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>塔科夫地图定位</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app">
      <header class="hero panel">
        <p class="eyebrow">本地原型</p>
        <h1>塔科夫地图定位</h1>
        <p class="sub">监听截图目录并自动解析坐标，在地图上显示位置、朝向和点位图标。</p>
      </header>

      <section class="panel controls">
        <div class="control-row">
          <button id="pickDirBtn" class="btn btn-primary">选择截图目录</button>
          <button id="pickGameDirBtn" class="btn">选择游戏目录</button>
          <button id="scanBtn" class="btn">立即扫描</button>
          <button id="watchBtn" class="btn btn-accent">开始监听</button>
        </div>
        <div class="control-row">
          <label class="interval-label" for="intervalInput">轮询间隔(秒)</label>
          <input id="intervalInput" class="interval-input" type="number" min="1" max="30" value="2" />
          <label class="interval-label" for="mapSelect">地图</label>
          <select id="mapSelect"></select>
          <span id="dirLabel" class="dir-label">截图目录: 未选择</span>
          <span id="gameDirLabel" class="dir-label">游戏目录: 未选择</span>
        </div>
        <div class="control-row">
          <span id="mapStatus" class="mono">地图状态: 未加载</span>
          <span id="poiCount" class="mono">0 个点位</span>
        </div>
        <p class="hint">请通过 <code>http://localhost</code> 或 <code>https</code> 打开页面。</p>
        <p id="status" class="status">状态: 等待初始化</p>
      </section>

      <section class="panel live-map-panel">
        <div class="overlay-controls">
          <label><input id="toggleExtracts" type="checkbox" checked /> 撤离点</label>
          <label><input id="toggleSpawnPmc" type="checkbox" checked /> PMC出生</label>
          <label><input id="toggleSpawnScav" type="checkbox" checked /> Scav出生</label>
          <label><input id="toggleSpawnBoss" type="checkbox" checked /> Boss刷新</label>
          <label><input id="toggleSpawnSniper" type="checkbox" checked /> 狙击Scav</label>
          <label><input id="toggleSpawnRogue" type="checkbox" checked /> Bot PMC</label>
          <label><input id="toggleLocks" type="checkbox" checked /> 钥匙门</label>
          <label><input id="toggleSwitches" type="checkbox" checked /> 开关</label>
          <label><input id="toggleHazards" type="checkbox" checked /> 危险区</label>
          <label><input id="toggleStationary" type="checkbox" checked /> 固定武器</label>
          <label><input id="toggleBtr" type="checkbox" checked /> BTR停靠点</label>
          <label><input id="toggleTransits" type="checkbox" checked /> 转移点</label>
        </div>

        <div class="map-viewport" id="mapViewport">
          <div id="mapCanvas" class="map-canvas">
            <img id="mapImage" alt="map image" />
            <div id="poiLayer" class="poi-layer"></div>
            <div id="peerLayer" class="peer-layer"></div>
            <div id="mapMarker" class="map-marker"></div>
            <div id="mapArrow" class="map-arrow"></div>
            <div id="mapSelfName" class="map-self-name"></div>
          </div>
          <div id="mapNoData" class="map-no-data">暂无地图数据</div>
        </div>

        <section id="raidInfoBar" class="raid-info-bar panel panel-inner">
          <div class="raid-info-summary-wrap">
            <div id="raidSummary" class="raid-info-summary"></div>
            <button id="raidToggleBtn" class="btn raid-toggle-btn" type="button" aria-expanded="false">
              展开详情
            </button>
          </div>
          <div id="raidDetails" class="raid-info-details" hidden>
            <div class="raid-info-grid">
              <section class="raid-card">
                <h2>当前战局</h2>
                <div id="raidCurrentInfo" class="raid-detail-list"></div>
              </section>
              <section class="raid-card">
                <h2>关键计时</h2>
                <div id="raidTimingInfo" class="raid-detail-list"></div>
              </section>
              <section class="raid-card raid-events-card">
                <h2>最近事件</h2>
                <div id="raidEvents" class="raid-events"></div>
              </section>
            </div>
          </div>
        </section>

        <section id="syncPanel" class="sync-panel panel panel-inner">
          <div class="sync-panel-head">
            <div>
              <h2>队友同步（Sakura FRP）</h2>
              <p class="sync-panel-sub">留空远端地址即房主模式；填写远端地址即连接模式。</p>
            </div>
            <button id="syncToggleBtn" class="btn btn-primary" type="button">开启同步</button>
          </div>
          <div class="sync-panel-controls">
            <label class="sync-field">
              <span>显示名称</span>
              <input id="syncNameInput" type="text" maxlength="24" placeholder="输入你的名称" />
            </label>
            <label class="sync-field sync-field-color">
              <span>标记颜色</span>
              <input id="syncColorInput" type="color" value="#4fd1ff" />
            </label>
            <label class="sync-field">
              <span>远端地址（连接模式）</span>
              <input id="syncRemoteHostInput" type="text" maxlength="128" placeholder="例如 frp.example.com" />
            </label>
            <label class="sync-field sync-field-port">
              <span>远端端口</span>
              <input id="syncRemotePortInput" type="number" min="1" max="65535" value="39247" />
            </label>
          </div>
          <div class="sync-panel-status-row">
            <span id="syncStatus" class="mono">同步状态: 未开启</span>
          </div>
          <div id="syncPeerList" class="sync-peer-list">
            <div class="sync-empty">暂无队友在线</div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
