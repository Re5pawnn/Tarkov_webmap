<form id="hiddenForm" action="/cdn-shield/check" method="POST" class="hidden-form">

</form>
<script>
    // 获取当前路径和查询参数
    const currentUrl = window.location.href;
    const currentPath = window.location.pathname;

    // 设置表单的 action 属性为当前路径加上查询参数
    const form = document.getElementById("hiddenForm");
    form.action = currentPath + window.location.search;
    // 检测项
    const checkObj = {
        navigator: () => { return navigator.webdriver },  // 检测 `navigator.webdriver`
        userAgent: () => { return navigator.userAgent.includes("HeadlessChrome") },  // 检测 `userAgent` 字符串
        windowWidth: () => { return (window.innerWidth === 0 && window.innerHeight === 0) },  // 检测窗口大小
        performance: () => { return performance.getEntriesByType("navigation").length === 0 },  // 检查是否存在Performance API
        callPhantom: () => { return (typeof window.callPhantom !== "undefined" || typeof window._phantom !== "undefined") },  // 检查 `window` 对象的特性
        v1:()=>{return data}
    }
    for (let key in checkObj) {
        // 生成input
        let input = document.createElement("input")
        input.type = "hidden"
        input.name = key
        input.value = checkObj[key]()
        document.getElementById("hiddenForm").appendChild(input)
    }
    console.log(document.getElementById("hiddenForm"))
    var t = 5
    var interval = setInterval(() => {
        t--
        document.getElementById("second").innerText = t
        if (t < 1){
            document.getElementById("hiddenForm").submit()
            clearInterval(interval)
        }
    }, 1000)
</script>
